training:
    learning_rate: 0.00001  # giảm LR: tránh overfit nhanh
    batch_size: 16
    num_epochs: 15
    warmup_steps: 500       # warmup dài hơn: ổn định giai đoạn đầu
    weight_decay: 0.05      # tăng L2 regularization: 0.01 → 0.05
    fp16: true # Mixed precision training
    seed: 42

optimizer:
    type: "AdamW"
    betas: [0.9, 0.999]
    eps: 1e-8

scheduler:
    type: "cosine"

logging:
    log_steps: 50
    eval_steps: 100
    save_steps: 100
    save_total_limit: 3

wandb:
    project: "moodnote-ai"
    name: "phobert-base-vsmec"
    enabled: true
