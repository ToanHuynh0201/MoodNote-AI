training:
    learning_rate: 1.8e-5 # Run 1: giảm nhẹ LR để ổn định hơn
    batch_size: 16
    gradient_accumulation_steps: 2 # effective batch = 16 * 2 = 32
    num_epochs: 14 # Run 1: giảm trần epoch để hạn chế overfit cuối
    warmup_ratio: 0.06 # Run 1: warmup vừa phải
    weight_decay: 0.07 # Run 1: regularization cân bằng
    fp16: true
    seed: 42
    early_stopping_patience: 2 # Run 1: dừng sớm tích cực hơn
    use_llrd: true # Layer-wise LR Decay
    llrd_factor: 0.9 # mỗi layer giảm 10% so với layer trên
    use_class_weights: true # tính class weights từ training data
    rdrop_alpha: 0.2 # Run 1: giảm nhẹ R-Drop để giữ fit capacity

optimizer:
    type: "AdamW"
    betas: [0.9, 0.999]
    eps: 1e-8

scheduler:
    type: "cosine"

logging:
    log_steps: 25 # tăng granularity từ 50 → 25
    eval_steps: 80 # Run 1: theo dõi sớm hơn quanh vùng peak
    save_steps: 80 # match eval_steps
    save_total_limit: 4 # Run 1: giữ số checkpoint vừa đủ

wandb:
    project: "moodnote-ai"
    name: "phobert-base-v2-augmented"
    enabled: true
