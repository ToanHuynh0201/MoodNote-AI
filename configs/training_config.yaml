training:
    learning_rate: 1e-5  # giảm từ 2e-5 → ổn định hơn ở Stage 2, tránh overfit sớm
    batch_size: 8
    gradient_accumulation_steps: 4 # effective batch = 8 * 4 = 32
    num_epochs: 20
    warmup_ratio: 0.1
    weight_decay: 0.05    # tăng từ 0.01 → L2 regularization mạnh hơn để giảm overfitting
    fp16: true
    seed: 42
    early_stopping_patience: 10 # tăng từ 8 → R-Drop cần thêm thời gian để hội tụ
    use_llrd: true # Layer-wise LR Decay
    llrd_factor: 0.9 # mỗi layer giảm 10% so với layer trên
    use_class_weights: true # tính class weights từ training data
    rdrop_alpha: 0.0  # R-Drop alpha (0.0 = tắt); override trong notebook: Stage 2 dùng 4.0

optimizer:
    type: "AdamW"
    betas: [0.9, 0.999]
    eps: 1e-8

scheduler:
    type: "cosine"

logging:
    log_steps: 50 # merged dataset ~3-4x lớn hơn, giảm log noise
    eval_steps: 100 # granular hơn để bắt best checkpoint sớm hơn
    save_steps: 100 # match eval_steps
    save_total_limit: 4

wandb:
    project: "moodnote-ai"
    name: "phobert-base-v5-cleanlabels"
    enabled: true
