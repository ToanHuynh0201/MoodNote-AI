training:
    learning_rate: 0.00002          # LR thấp hơn 1 chút cho large model
    batch_size: 8                   # giảm batch_size để fit VRAM T4 với phobert-large
    gradient_accumulation_steps: 4  # effective batch = 8 * 4 = 32
    num_epochs: 15
    warmup_steps: 300
    weight_decay: 0.01
    fp16: true # Mixed precision training
    seed: 42

optimizer:
    type: "AdamW"
    betas: [0.9, 0.999]
    eps: 1e-8

scheduler:
    type: "cosine"

logging:
    log_steps: 50
    eval_steps: 100
    save_steps: 100
    save_total_limit: 3

wandb:
    project: "moodnote-ai"
    name: "phobert-base-vsmec"
    enabled: true
