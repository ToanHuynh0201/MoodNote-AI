training:
    learning_rate: 2e-5              # giảm từ 3e-5 → fit chậm hơn, ít overfit hơn
    batch_size: 16
    gradient_accumulation_steps: 2  # effective batch = 16 * 2 = 32
    num_epochs: 20                   # ceiling; early stopping dừng đúng lúc
    warmup_ratio: 0.10               # warmup dài hơn → training ổn định hơn
    weight_decay: 0.10               # tăng từ 0.05 → L2 mạnh hơn để chống overfit
    fp16: true
    seed: 42
    early_stopping_patience: 3      # giảm từ 7 → dừng sớm hơn, tránh overfit sau peak
    use_llrd: true                   # Layer-wise LR Decay
    llrd_factor: 0.9                 # mỗi layer giảm 10% so với layer trên
    use_class_weights: true          # tính class weights từ training data
    rdrop_alpha: 0.3                 # R-Drop: KL divergence weight (0 = tắt)

optimizer:
    type: "AdamW"
    betas: [0.9, 0.999]
    eps: 1e-8

scheduler:
    type: "cosine"

logging:
    log_steps: 25                    # tăng granularity từ 50 → 25
    eval_steps: 100                  # không quá dày để tránh fluctuation trigger early stopping
    save_steps: 100                  # match eval_steps
    save_total_limit: 5              # giữ nhiều checkpoint hơn gần vùng peak

wandb:
    project: "moodnote-ai"
    name: "phobert-base-v2-augmented"
    enabled: true
