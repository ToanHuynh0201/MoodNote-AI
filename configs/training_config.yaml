training:
    learning_rate: 2e-5  # standard base-size RoBERTa fine-tuning LR
    batch_size: 16       # T4 16GB safe với ViSoBERT 135M + R-Drop
    gradient_accumulation_steps: 2 # effective batch = 16 * 2 = 32
    num_epochs: 20
    warmup_ratio: 0.1
    weight_decay: 0.05
    fp16: true
    seed: 42
    early_stopping_patience: 5   # giảm từ 10 — với eval_steps=100, patience=10 cho phép 1000 steps không cải thiện
    use_llrd: true # Layer-wise LR Decay
    llrd_factor: 0.9 # mỗi layer giảm 10% so với layer trên (12 layers với ViSoBERT base)
    use_class_weights: true
    rdrop_alpha: 0.0  # R-Drop alpha (0.0 = tắt); override trong notebook: Stage 2 dùng 1.0

optimizer:
    type: "AdamW"
    betas: [0.9, 0.999]
    eps: 1e-8

scheduler:
    type: "cosine"

logging:
    log_steps: 50 # merged dataset ~3-4x lớn hơn, giảm log noise
    eval_steps: 100 # granular hơn để bắt best checkpoint sớm hơn
    save_steps: 100 # match eval_steps
    save_total_limit: 4

wandb:
    project: "moodnote-ai"
    name: "visobert-v1"
    enabled: true
