training:
    learning_rate: 3e-5              # tăng nhẹ (LLRD sẽ giảm cho bottom layers tự động)
    batch_size: 16                   # phobert-base nhẹ hơn, T4 có thể dùng batch lớn hơn
    gradient_accumulation_steps: 2  # effective batch = 16 * 2 = 32 (giữ nguyên effective)
    num_epochs: 15                   # tăng, early stopping sẽ dừng đúng lúc
    warmup_ratio: 0.06               # ~100 steps warmup thay vì 500 cứng (6% of total steps)
    weight_decay: 0.01               # giảm từ 0.1 → 0.01 (chuẩn cho transformer)
    fp16: true
    seed: 42
    early_stopping_patience: 5      # configurable (trước bị hardcode là 3)
    use_llrd: true                   # Layer-wise LR Decay
    llrd_factor: 0.9                 # mỗi layer giảm 10% so với layer trên
    use_class_weights: true          # tính class weights từ training data

optimizer:
    type: "AdamW"
    betas: [0.9, 0.999]
    eps: 1e-8

scheduler:
    type: "cosine"

logging:
    log_steps: 50
    eval_steps: 100
    save_steps: 100
    save_total_limit: 3

wandb:
    project: "moodnote-ai"
    name: "phobert-base-llrd-classweights"
    enabled: true
