model:
    name: "vinai/phobert-base"     # 135M params, hidden_size=768
    # name: "vinai/phobert-large"    # 370M params, hidden_size=1024
    num_labels: 7
    max_seq_length: 128
    dropout: 0.3          # tăng từ 0.2 → giảm overfitting (train loss=0.085 vs val loss=1.092)
    label_smoothing: 0.15 # tăng từ 0.1 → regularization mềm hơn
    focal_gamma: 3.0      # tăng từ 2.0 → phạt nặng hơn với Anger/Disgust confused samples

emotion_labels:
    0: "Enjoyment"
    1: "Sadness"
    2: "Anger"
    3: "Fear"
    4: "Disgust"
    5: "Surprise"
    6: "Other"

sentiment_scores:
    Enjoyment: 1.0
    Surprise: 0.3
    Other: 0.0
    Fear: -0.5
    Disgust: -0.7
    Sadness: -0.8
    Anger: -0.9

preprocessing:
    segmenter: "pyvi" # Fast alternative to VnCoreNLP
    lowercase: false
