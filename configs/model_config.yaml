model:
  name: "vinai/phobert-base"
  # name: "vinai/phobert-large"  # uncomment nếu GPU có đủ RAM (>= 16GB)
  num_labels: 7
  max_seq_length: 128
  dropout: 0.2         # tăng dropout: 0.1 → 0.2 để regularize mạnh hơn
  label_smoothing: 0.1

emotion_labels:
  0: "Enjoyment"
  1: "Sadness"
  2: "Anger"
  3: "Fear"
  4: "Disgust"
  5: "Surprise"
  6: "Other"

sentiment_scores:
  Enjoyment: 1.0
  Surprise: 0.3
  Other: 0.0
  Fear: -0.5
  Disgust: -0.7
  Sadness: -0.8
  Anger: -0.9

preprocessing:
  segmenter: "pyvi"  # Fast alternative to VnCoreNLP
  lowercase: false
