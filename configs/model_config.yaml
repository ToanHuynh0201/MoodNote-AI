model:
    name: "vinai/phobert-base"
    # name: "vinai/phobert-large"   # 370M params, hidden_size=1024
    num_labels: 7
    max_seq_length: 128
    dropout: 0.3
    label_smoothing: 0.05            # giảm từ 0.1 → soft targets vừa phải hơn cho 7-class
    focal_gamma: 1.5                 # giảm từ 2.0 → 1.5 (vẫn focus hard examples nhưng nhẹ hơn)

emotion_labels:
    0: "Enjoyment"
    1: "Sadness"
    2: "Anger"
    3: "Fear"
    4: "Disgust"
    5: "Surprise"
    6: "Other"

sentiment_scores:
    Enjoyment: 1.0
    Surprise: 0.3
    Other: 0.0
    Fear: -0.5
    Disgust: -0.7
    Sadness: -0.8
    Anger: -0.9

preprocessing:
    segmenter: "pyvi" # Fast alternative to VnCoreNLP
    lowercase: false
