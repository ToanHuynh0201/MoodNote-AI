model:
    name: "vinai/phobert-base-v2"  # PhoBERT base v2, improved over original
    # name: "uitnlp/visobert"        # 135M params, hidden_size=768, pre-trained trên social media tiếng Việt
    num_labels: 7
    max_seq_length: 128
    dropout: 0.4          # tăng từ 0.3 → giảm overfitting (best ckpt step 1500, train đến 4500)
    label_smoothing: 0.1  # giảm từ 0.15 → bớt uncertainty, giúp model commit hơn với Anger/Surprise
    focal_gamma: 2.0      # tăng từ 1.0 → focus mạnh hơn vào hard examples (Anger bị nhầm sang Disgust)

emotion_labels:
    0: "Enjoyment"
    1: "Sadness"
    2: "Anger"
    3: "Fear"
    4: "Disgust"
    5: "Surprise"
    6: "Other"

sentiment_scores:
    Enjoyment: 1.0
    Surprise: 0.3
    Other: 0.0
    Fear: -0.5
    Disgust: -0.7
    Sadness: -0.8
    Anger: -0.9

preprocessing:
    segmenter: "pyvi" # Fast alternative to VnCoreNLP
    lowercase: false
